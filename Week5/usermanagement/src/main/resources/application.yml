spring:
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?serverTimezone=Asia/Shanghai
    username: root
    password: lyzhmlzq1217.
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0


# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.example.usermanagement.entity
  configuration:
    map-underscore-to-camel-case: true   # 自动映射下划线字段到驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto          # 数据库自增主键
      logic-delete-field: deleted  # 如果表有逻辑删除字段可以配置（本例没有）

server:
  port: 8080

# JWT
jwt:
  secret: mySecretKeyForJWT12345678901234567890  # 至少32位
  expiration: 7200000 # 2小时，单位毫秒