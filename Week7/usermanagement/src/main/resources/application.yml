spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/user_db?serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件大小上限
      max-request-size: 10MB     # 整个请求大小上限（含多文件）


# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.example.usermanagement.entity
  configuration:
    map-underscore-to-camel-case: true   # 自动映射下划线字段到驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto          # 数据库自增主键
      logic-delete-field: deleted  # 如果表有逻辑删除字段可以配置（本例没有）

server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET}  # 至少32位，必须通过环境变量注入
  expiration: 7200000 # 2小时，单位毫秒


# OpenAPI 3 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: 用户管理系统 API
    description: 用户管理、认证授权接口文档
    version: 1.7.0
    contact:
      name: Yingzi Li
      email: 2546156509@qq.com

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    enable-host: false
    enable-host-text: false

# 缓存防护参数配置
cache:
  user:
    base-ttl-seconds: 1800  # 基础过期时间s，30分钟
    null-ttl-seconds: 120    # 空值缓存过期时间s，2分钟
    random-ttl-seconds: 300  # 随机过期时间s，5分钟
    lock-ttl-seconds: 10     # 分布式锁持有过期时间s，10秒
    lock-retry-times: 5      # 获取锁失败重试次数
    lock-retry-sleep-millis: 50  # 获取锁失败重试间隔ms